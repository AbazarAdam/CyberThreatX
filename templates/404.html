<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - CyberThreatX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #0a0c10;
            --accent-primary: #00ff9d;
            --text-main: #c9d1d9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
        }

        .glow {
            text-shadow: 0 0 20px rgba(0, 255, 157, 0.5);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-md-6 text-center">
                <i class="bi bi-shield-slash text-accent glow"
                    style="font-size: 6rem; color: var(--accent-primary);"></i>
                <h1 class="display-1 fw-extrabold text-main glow">404</h1>
                <h2 class="mb-4 text-bright">Page Not Found</h2>
                <p class="lead text-bright mb-5">
                    The requested endpoint is either restricted or does not exist.
                </p>
                <a href="/" class="btn btn-primary btn-lg px-5 py-3 fw-bold shadow"
                    style="background-color: var(--accent-primary); border: none; color: #0a0c10;">
                    <i class="bi bi-house-door me-2"></i> Return to Safety
                </a>
            </div>
        </div>
    </div>
</body>

</html>
